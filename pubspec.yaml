name: flutter_task_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  supabase_flutter: ^2.12.0 #ใช้เชื่อมต่อ และการเก็บการทำงาน
  image_picker: ^1.2.1 # ใช้เปิดกล้องเพื่อถ่ายรูป หรือ แกลอรี่เพื่อเลือกรูป

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  icons_launcher: ^3.0.3 # ใช้ สร้างไอคอนของ APP

icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
